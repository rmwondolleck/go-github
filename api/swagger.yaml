basePath: /
definitions:
  models.Service:
    properties:
      endpoint:
        type: string
      name:
        type: string
      status:
        type: string
      type:
        type: string
    type: object
  models.ServicesResponse:
    properties:
      services:
        items:
          $ref: '#/definitions/models.Service'
        type: array
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API for managing home lab devices and services
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Home Lab API
  version: "1.0"
paths:
  /api/v1:
    get:
      consumes:
      - application/json
      description: Get API version information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: API root
      tags:
      - api
  /api/v1/services:
    get:
      description: Returns list of all services in the homelab
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ServicesResponse'
      summary: List available services
      tags:
      - services
  /health:
    get:
      consumes:
      - application/json
      description: Get the health status of the API
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
schemes:
- http
swagger: "2.0"
